<html>
    <head>
    <title> Aula 02 Tabelas</title>
    <meta charset="utf-8"> <!--meta serve para que as palavras não fiquem desconfigurada-->
    </head>
    <body>
        <header> 
            <table border="1">
            <caption>Disciplinas</caption>
            <tr> 
                <th colspan="5">Grade de horários</th> <!--Mesclando duas células de linhas-->
            </tr>
            <tr>
                <th>Segunda</th>
                <th>Terça</th>
                <th>Quarta</th>
                <th>Quinta</th>
                <th>Sexta</th>
            </tr>
            <tr>
                <td>Matemática</td>
                <td>Português</td> 
                <td rowspan="2">Biologia</td>    
                <td>Sociologia</td>  
                <td>História</td>      
            </tr> 
            <tr>
                  <td rowspan="2">História</td>
                  <td>Matemática</td>
                  <td>Filosofia</td>
                  <td>Português</td>
            </tr>
            <tr>
                <td>Literatura</td>
                <td>Português</td>
                <td>Química</td>
                <td>Física</td>
            </tr>
            <tr>
                <td>Português</td>
                <td>Literatura</td>
                <td rowspan="2">Física</td>
                <td>Biologia</td>
                <td>Matemática</td>
            </tr>
            <tr>
                <td>Ed. Física</td>
                <td>Matemática</td>
                <td>Sociologia</td>
                <td>Filosofia</td>
            </tr>

        </table>
        </header>   

        </body>
     </html>
